name: Bun Check

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck and test
        run: bun run check

      - name: Build
        run: bun run build
