name: Deploy

# Deploys both surfaces on push to main:
#   - Worker  → contextmem-backend (API/MCP backend)
#   - Pages   → contextmem.pages.dev (web frontend)
#
# OFF BY DEFAULT: both jobs are gated on the repo VARIABLE `DEPLOY_ENABLED == 'true'`,
# so a fork/clone without Cloudflare credentials shows these jobs as *skipped*
# (green CI) instead of failing red. You can always deploy manually with
# `wrangler deploy` / `wrangler pages deploy`.
#
# To turn ON CI auto-deploy:
#   1. Create a Cloudflare API token with: Workers Scripts:Edit, Cloudflare Pages:Edit,
#      D1:Edit, Workers R2 Storage:Edit, Workers KV:Edit, Queues:Edit,
#      Account Settings:Read, and User Details:Read.
#   2. Add repo SECRETS: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID,
#      CONTEXTMEM_NAMESPACE_IMPORT_TOKEN (pushed as a Worker secret).
#   3. Add repo VARIABLE: DEPLOY_ENABLED = true.
# Other Worker secrets are managed in the Cloudflare dashboard (not pushed by CI):
#   FIRECRAWL_API_KEY, MEMWAL_ACCOUNT_ID, MEMWAL_API_URL, MEMWAL_PRIVATE_KEY, TATUM_API_KEY
# Optional repo variable: CONTEXTMEM_API_BASE (worker URL the web build points at).
# When CI deploy is ON, DISABLE Cloudflare Git auto-deploy for Pages (avoids double-deploys).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - run: bun install --frozen-lockfile
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api/cloudflare
          # Force bun: this is a bun workspace, npm chokes on `workspace:*` deps
          # (EUNSUPPORTEDPROTOCOL) when wrangler-action tries to self-install.
          packageManager: bun
          wranglerVersion: "4.95.0"
          command: deploy
          secrets: |
            CONTEXTMEM_NAMESPACE_IMPORT_TOKEN
        env:
          CONTEXTMEM_NAMESPACE_IMPORT_TOKEN: ${{ secrets.CONTEXTMEM_NAMESPACE_IMPORT_TOKEN }}

  deploy-pages:
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - run: bun install --frozen-lockfile
      - name: Build web
        run: bun run --filter @contextmem/web build
        env:
          VITE_CONTEXTMEM_API_BASE: ${{ vars.CONTEXTMEM_API_BASE || 'https://contextmem-backend.petlofi.workers.dev' }}
      - name: Deploy Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          wranglerVersion: "4.95.0"
          command: pages deploy apps/web/dist --project-name=contextmem --branch=main
