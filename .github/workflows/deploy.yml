name: Deploy

# Deploys both surfaces on push to main:
#   - Worker  → contextmem-backend (API/MCP backend)
#   - Pages   → contextmem.pages.dev (web frontend)
# Cloudflare Git auto-deploy for Pages should be DISABLED so this is the single
# deploy path (avoids double-deploys).
#
# Required GitHub repo secrets:
#   CLOUDFLARE_API_TOKEN              (Workers + Pages edit, D1, R2, Queues)
#   CLOUDFLARE_ACCOUNT_ID
#   CONTEXTMEM_NAMESPACE_IMPORT_TOKEN (pushed as a Worker secret)
# Worker secrets managed in the Cloudflare dashboard (not pushed by CI):
#   FIRECRAWL_API_KEY, MEMWAL_ACCOUNT_ID, MEMWAL_API_URL, MEMWAL_PRIVATE_KEY
# Optional repo variable:
#   CONTEXTMEM_API_BASE  (worker URL the web build points at; defaults below)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - run: bun install --frozen-lockfile
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api/cloudflare
          command: deploy
          secrets: |
            CONTEXTMEM_NAMESPACE_IMPORT_TOKEN
        env:
          CONTEXTMEM_NAMESPACE_IMPORT_TOKEN: ${{ secrets.CONTEXTMEM_NAMESPACE_IMPORT_TOKEN }}

  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - run: bun install --frozen-lockfile
      - name: Build web
        run: bun run --filter @contextmem/web build
        env:
          VITE_CONTEXTMEM_API_BASE: ${{ vars.CONTEXTMEM_API_BASE || 'https://contextmem-backend.petlofi.workers.dev' }}
      - name: Deploy Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=contextmem --branch=main
